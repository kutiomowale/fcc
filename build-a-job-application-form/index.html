<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="center">Job Application Form</h1>
    <form>
      <label for="name">Full name: </label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Enter your full name"
        required
      >
      <label for="email">Email: </label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your Email"
        required
      >
      <label for="position">Position: </label>
      <select id="position" name="position" required>
          <option value="">Select a Position</option>
          <option value="plumber">Plumber</option>
          <option value="electrician">Electrician</option>
          <option value="solar-installer">Solar Installer</option>
          <option value="electrical-automation-expert">Electrical Automation Expert</option>
      </select>
      <fieldset class="radio-group">
        <legend>Availability: </legend>
        <input
          type="radio"
          id="full-time"
          name="availability"
          value="full-time"
          class="availability-radio-btn"
          checked
      >
        <label class="availability" for="full-time">Full-Time </label>
        <input
          type="radio"
          id="part-time"
          name="availability"
          value="part-time"
          class="availability-radio-btn"
      >
        
        <label for="part-time" class="availability">Part-Time </label>
      </fieldset>
      <label for="message">Why do yo want this job?</label>
      <textarea
        id="message"
        name="name"
        placeholder="Write your motivation"
        required
      ></textarea>
      <button type="submit" class="submit-btn">Submit Application</button>
    </form>
  </div>
</body>
</html>
